# ==========================================================================
#  Lista Smart API - configuracao
# ==========================================================================
# Os valores sensiveis sao lidos de variaveis de ambiente para nao versionar
# segredos. Defina-os no ambiente (ou em um application-local.properties que
# NAO deve ir para o git). Os defaults apos ':' sao apenas placeholders.

server.port=${PORT:8080}

# --------------------------------------------------------------------------
# NeonDB (PostgreSQL serverless)
# --------------------------------------------------------------------------
# A connection string do painel da Neon tem o formato:
#   postgresql://<user>:<password>@<host>/<db>?sslmode=require
# Para JDBC usa-se o prefixo jdbc: e os parametros de SSL exigidos pela Neon.
# Exemplo de host: ep-cool-name-123456.sa-east-1.aws.neon.tech
spring.datasource.url=${NEON_DB_URL:jdbc:postgresql://SEU_HOST.neon.tech/listasmart?sslmode=require}
spring.datasource.username=${NEON_DB_USER:listasmart_owner}
spring.datasource.password=${NEON_DB_PASSWORD:troque_aqui}
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------------------------------------------------------------------
# JPA / Hibernate (PostgreSQL)
# --------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' cria/ajusta o schema automaticamente em ambiente academico.
# Em producao prefira 'validate' + a migration manual em db/schema.sql.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Seed do catalogo (products/markets) na primeira subida, se estiver vazio.
spring.sql.init.mode=never

# --------------------------------------------------------------------------
# Seguranca (JWT)
# --------------------------------------------------------------------------
# Chave HS256 (>= 32 bytes). Em producao gere uma aleatoria e mantenha em env.
app.jwt.secret=${JWT_SECRET:troque-esta-chave-por-uma-aleatoria-de-32+bytes}
# Validade do token em milissegundos (default: 7 dias).
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# --------------------------------------------------------------------------
# NFC-e
# --------------------------------------------------------------------------
# Fonte dos itens da NFC-e. 'mock' gera uma nota deterministica a partir da
# chave (sem custo/SEFAZ). Uma implementacao real pode ser plugada com outro
# valor + um NfceItemResolver correspondente.
app.nfce.provider=${NFCE_PROVIDER:mock}

# Ferramentas de desenvolvimento: gerador de QR Code em /dev/nfce. Util para a
# demo; mantenha 'false' em producao (defina DEV_TOOLS_ENABLED=false no Render).
app.dev-tools.enabled=${DEV_TOOLS_ENABLED:true}
